<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Soresina Mercati product preview</title>
  <desc id="desc">A visual overview of the vendor booking flow, stall map, admin dashboard, Supabase database and security layer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="0.55" stop-color="#f6f2ea"/>
      <stop offset="1" stop-color="#e8f0e8"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c4a03"/>
      <stop offset="0.48" stop-color="#ba7517"/>
      <stop offset="1" stop-color="#386641"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#3f2f1f" flood-opacity="0.18"/>
    </filter>
    <style>
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
      .sans{font-family:Inter,Segoe UI,Arial,sans-serif}
      .title{font-weight:800;letter-spacing:-0.035em}
      .small{font-size:18px;fill:#6b6258}
      .label{font-size:16px;font-weight:700;fill:#6b6258;text-transform:uppercase;letter-spacing:.11em}
      .ink{fill:#231f20}
      .muted{fill:#8c8175}
      .card{fill:#fffdf8;stroke:#dfd6c9;stroke-width:1.4}
      .dark{fill:#201a17}
      .line{stroke:#d8cfc3;stroke-width:2}
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <path d="M0 612 C160 564 250 640 420 590 C590 538 710 612 850 572 C1010 526 1120 552 1280 500 L1280 720 L0 720 Z" fill="#fffdf8" opacity=".72"/>

  <g filter="url(#shadow)">
    <rect x="54" y="50" width="1172" height="620" rx="34" fill="#fffaf1" stroke="#ded2c3"/>
  </g>

  <rect x="88" y="86" width="1104" height="178" rx="28" fill="url(#hero)"/>
  <text x="126" y="134" class="mono" font-size="17" font-weight="800" fill="#fff2d8" letter-spacing=".18em">SORESINA MERCATI</text>
  <text x="126" y="196" class="sans title" font-size="58" fill="#ffffff">Local market booking,</text>
  <text x="126" y="252" class="sans title" font-size="58" fill="#ffffff">without the spreadsheet chaos.</text>
  <rect x="872" y="116" width="274" height="98" rx="18" fill="#fffaf1" opacity=".96"/>
  <text x="898" y="154" class="sans" font-size="22" font-weight="800" fill="#4d2f06">Operational app</text>
  <text x="898" y="184" class="sans small">vendors, admins, maps,</text>
  <text x="898" y="212" class="sans small">RLS and GDPR runbooks</text>

  <g transform="translate(88 300)">
    <rect class="card" width="330" height="286" rx="24"/>
    <text x="28" y="42" class="label sans">Vendor journey</text>
    <circle cx="48" cy="82" r="14" fill="#ba7517"/>
    <text x="76" y="89" class="sans" font-size="22" font-weight="800" fill="#231f20">Choose event</text>
    <line x1="48" y1="102" x2="48" y2="136" class="line"/>
    <circle cx="48" cy="156" r="14" fill="#386641"/>
    <text x="76" y="163" class="sans" font-size="22" font-weight="800" fill="#231f20">Pick stall</text>
    <line x1="48" y1="176" x2="48" y2="210" class="line"/>
    <circle cx="48" cy="230" r="14" fill="#2f6fef"/>
    <text x="76" y="237" class="sans" font-size="22" font-weight="800" fill="#231f20">Book online</text>
    <text x="28" y="272" class="sans small">Conflict-safe confirmation flow</text>
  </g>

  <g transform="translate(474 300)">
    <rect class="dark" width="330" height="286" rx="24"/>
    <text x="28" y="42" class="label sans" fill="#d8cfc3">Stall map</text>
    <g transform="translate(38 72)">
      <rect width="254" height="160" rx="16" fill="#2b2520"/>
      <g fill="#6bbf59">
        <rect x="24" y="22" width="40" height="28" rx="8"/>
        <rect x="78" y="22" width="40" height="28" rx="8"/>
        <rect x="132" y="22" width="40" height="28" rx="8"/>
      </g>
      <g fill="#d7a33f">
        <rect x="186" y="22" width="40" height="28" rx="8"/>
        <rect x="24" y="68" width="40" height="28" rx="8"/>
      </g>
      <g fill="#b5aea6">
        <rect x="78" y="68" width="40" height="28" rx="8"/>
        <rect x="132" y="68" width="40" height="28" rx="8"/>
        <rect x="186" y="68" width="40" height="28" rx="8"/>
      </g>
      <g fill="#6bbf59">
        <rect x="24" y="114" width="40" height="28" rx="8"/>
        <rect x="78" y="114" width="40" height="28" rx="8"/>
        <rect x="132" y="114" width="40" height="28" rx="8"/>
        <rect x="186" y="114" width="40" height="28" rx="8"/>
      </g>
    </g>
    <text x="28" y="260" class="sans" font-size="18" fill="#f4eadf">Grid fallback + lazy satellite map</text>
  </g>

  <g transform="translate(862 300)">
    <rect class="card" width="330" height="286" rx="24"/>
    <text x="28" y="42" class="label sans">Admin cockpit</text>
    <rect x="28" y="68" width="274" height="54" rx="14" fill="#fff2db" stroke="#ead3ad"/>
    <text x="48" y="101" class="sans" font-size="22" font-weight="800" fill="#4d2f06">Bookings + CSV</text>
    <rect x="28" y="138" width="274" height="54" rx="14" fill="#edf7ed" stroke="#c8dfc8"/>
    <text x="48" y="171" class="sans" font-size="22" font-weight="800" fill="#244f2b">Waitlist + print</text>
    <rect x="28" y="208" width="274" height="54" rx="14" fill="#f6eef9" stroke="#dec8e8"/>
    <text x="48" y="241" class="sans" font-size="22" font-weight="800" fill="#4f2d61">Audit + retention</text>
  </g>

  <g transform="translate(128 610)">
    <rect x="0" y="0" width="1024" height="34" rx="17" fill="#201a17"/>
    <circle cx="26" cy="17" r="7" fill="#6bbf59"/>
    <text x="46" y="23" class="mono" font-size="15" fill="#fffaf1">Next.js 14</text>
    <circle cx="190" cy="17" r="7" fill="#3ecf8e"/>
    <text x="210" y="23" class="mono" font-size="15" fill="#fffaf1">Supabase RLS</text>
    <circle cx="394" cy="17" r="7" fill="#ba7517"/>
    <text x="414" y="23" class="mono" font-size="15" fill="#fffaf1">Vercel</text>
    <circle cx="548" cy="17" r="7" fill="#8b5cf6"/>
    <text x="568" y="23" class="mono" font-size="15" fill="#fffaf1">Sentry</text>
    <circle cx="700" cy="17" r="7" fill="#ef4444"/>
    <text x="720" y="23" class="mono" font-size="15" fill="#fffaf1">GDPR operations</text>
  </g>
</svg>
